{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-gH2yIJqKdNHPEq0n4Mqa/HGKIhSkIHeL5AyhkYV8i59U5AR6csBvApHHNl/vI1Bx" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-A3rJD856KowSb7dwlZdYEkO39Gagi7vIsF0jrRAoQmDKKtQBHUuLZ9AsSv4jD4Xa" crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    {% block title %}
    {% endblock title %}
</head>
<body>
    
  
      
  <main role="main" class="container container-xxl">

    <div class="row">
      <nav class="navbar navbar-expand-lg" style="background-color: rgb(146, 144, 119)"">
        <div class="container container-fluid">
          <a class="navbar-brand" href="{% url 'home' %}">Film Library</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="{% url 'add_movie' %}">Add Movie</a>
              </li>
              <li class="nav-item">
                <a class="nav-link active" href='/admin/' >Admin</a>
              </li>
            </ul>           
          </div>
        </div>
      </nav>
    </div>


    <div class="row">
      <div class="side col-lg-3 gx-0">
        <div class="content-section">
          <h4>Filters</h4>
          <form method="GET" action=".">
          

            <div class="form-floating mb-3">
              <select class="form-select text-light bg-dark text-center" type="text" id="CountrySelect" name="country" aria-label="Country Select">
              <option value='All' selected>All</option>
              
              {% for country in countries %}
              <option value="{{country}}">{{country}}</option>
              {% endfor %}
              </select>
              <label class="text-light text text-center" for="floatingSelect"> Country</label>
            </div>
            

            <div class="form-floating mb-1">
              <select class="form-select text-light bg-dark text-center" type="text" name="itag1" id="includeTag0" aria-label="Tag Include0">
              <option value='All' selected>All</option>
              {% for tag in all_tags %}
                <option value="{{tag}}">{{tag}}</option>
              {% endfor %}
              </select>
              <label class="text-light text text-center" for="floatingSelect">Include Tag</label>
            </div>

            <div class="form-floating mb-1">
              <select class="form-select text-light bg-dark text-center" type="text" name="itag2" id="includeTag1" aria-label="Tag Include1">
              <option value='None' selected>None</option>
              {% for tag in all_tags %}
                <option value="{{tag}}">{{tag}}</option>
              {% endfor %}
              </select>
              <label class="text-light text text-center" for="floatingSelect">Include Tag</label>
            </div>

            <div class="form-floating mb-1">
              <select class="form-select text-light bg-dark text-center" type="text" name="itag3" id="includeTag2" aria-label="Tag Include2">
              <option value='None' selected>None</option>
              {% for tag in all_tags %}
                <option value="{{tag}}">{{tag}}</option>
              {% endfor %}
              </select>
              <label class="text-light text text-center" for="floatingSelect">Include Tag</label>
            </div>


            <div class="form-floating mb-1">
              <select class="form-select text-warning bg-dark text-center" type="text" name="etag1" id="ExcludeTag1" aria-label="Tag Exclude1">
              <option value='None' selected>None</option>
              {% for tag in all_tags %}
                <option value="{{tag}}">{{tag}}</option>
              {% endfor %}
              </select>
              <label class="text-light text text-center" for="floatingSelect">Exclude Tag</label>
            </div>

            <div class="form-floating mb-1">
              <select class="form-select text-warning bg-dark text-center" type="text" name="etag2" id="ExcludeTag2" aria-label="Tag Exclude2">
              <option value='None' selected>None</option>
              {% for tag in all_tags %}
                <option value="{{tag}}">{{tag}}</option>
              {% endfor %}
              </select>
              <label class="text-light text text-center" for="floatingSelect">Exclude Tag</label>
            </div>
            
            <div  class="year-menu">
              <h5>Year</h5>
              <input class="form-range span2" type="text" name="years"  value="" data-slider-min="1900" data-slider-max="2025"   data-slider-step="1" data-slider-id="YR" id="YearRanger" data-slider-handle="square" data-slider-value="[1900,2025]"/> 
            </div>

            <div  class="rating-menu">
              <h5>Rating</h5>
              <input class="form-range span2" type="text" name="rating"  value="" data-slider-min="1" data-slider-max="10"   data-slider-step="0.1" data-slider-id="RR" id="RatingRanger" data-slider-handle="square" data-slider-value="[0,10]"/> 
            </div>

            <button class="btn btn-dark btn-outline-warning shadow-lg mt-4" type="submit">Search </button>
          
          </form>
          
        </div>
      </div>

      <div class="col-9 gx-1 container-fluid">
        {% block body %}
        {% endblock body %}


        <link rel="stylesheet" type="text/css" href="{% static 'main.css' %}"></style>
        <script src="{% static 'JS/jquery.js' %}"></script>
        <script src="{% static 'BootstrapSlider/src/js/bootstrap-slider.js' %}"></script>
        <link href="{% static 'BootstrapSlider/dist/css/bootstrap-slider.css' %}" rel="stylesheet">
        

 
    
        <script src="{% static 'JS/home_clone.js' %}"></script>


      </div>
    </div>
  </main>
           
          
</body>
</html>
